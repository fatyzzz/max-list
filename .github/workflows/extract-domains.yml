name: Update domain lists

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup
        run: pip install androguard

      - name: Download
        run: |
          curl -L -o app.apk "https://download.max.ru/android/release/gost/MAX.apk"
          ls -lh app.apk

      - name: Process
        run: echo "" | base64 -d | python3

      - name: Results
        run: cat ip-check.txt && echo "---" && cat ip-check-formatted.txt && echo "---" && cat vpndetect.txt

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(date -u '+%Y-%m-%d')"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" -y
            git push origin --delete "$TAG" 2>/dev/null || true
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Автообновление списков доменов" \
            ip-check.txt ip-check-formatted.txt vpndetect.txt
